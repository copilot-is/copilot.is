name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Validate tag matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
            echo "Tag ${TAG_NAME} does not match package.json version ${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Detect release channel
        id: release_meta
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

          if [[ "$TAG_NAME" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgres://dummy:dummy@dummy:5432/dummy
          AUTH_SECRET: dummy_auth_secret_for_build
          APP_SECRET: dummy_app_secret_for_build
          BLOB_READ_WRITE_TOKEN: vercel_blob_rw_dummy_token_for_build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          generate_release_notes: true
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
